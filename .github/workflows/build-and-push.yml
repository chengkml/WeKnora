name: WeKnora 镜像构建与推送

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ${{ vars.REGISTRY || 'crpi-u265r07n4blchcqo.cn-shanghai.personal.cr.aliyuncs.com' }}
  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE || 'ck-registry' }}
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-app:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      app_image: ${{ steps.vars.outputs.app_image }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 生成镜像变量
        id: vars
        shell: bash
        run: |
          NS="${{ env.REGISTRY_NAMESPACE }}"
          echo "app_image=${{ env.REGISTRY }}/${NS}/weknora-app" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: 准备版本信息
        id: version
        run: |
          eval "$(./scripts/get_version.sh env)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit_id=$COMMIT_ID" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"
          echo "go_version=$GO_VERSION" >> "$GITHUB_OUTPUT"
          ./scripts/get_version.sh info

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=docker.m.daocloud.io/moby/buildkit:buildx-stable-1

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 构建并推送 App 镜像
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64
          file: docker/Dockerfile.app
          context: .
          build-args: |
            VERSION_ARG=${{ steps.version.outputs.version }}
            COMMIT_ID_ARG=${{ steps.version.outputs.commit_id }}
            BUILD_TIME_ARG=${{ steps.version.outputs.build_time }}
            GO_VERSION_ARG=${{ steps.version.outputs.go_version }}
          tags: |
            ${{ steps.vars.outputs.app_image }}:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.app_image }}:latest
          cache-from: type=gha,scope=weknora-app
          cache-to: type=gha,mode=max,scope=weknora-app

  build-ui:
    runs-on: ubuntu-latest
    needs: build-app

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 构建前端
        env:
          VITE_IS_DOCKER: true
          VITE_FRONTEND_COMMIT: ${{ needs.build-app.outputs.image_tag }}
        run: ./scripts/build_frontend_dist.sh

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=docker.m.daocloud.io/moby/buildkit:buildx-stable-1

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 构建并推送 UI 镜像
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64
          file: frontend/Dockerfile
          context: ./frontend
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-ui:${{ needs.build-app.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-ui:latest
          cache-from: type=gha,scope=weknora-ui
          cache-to: type=gha,mode=max,scope=weknora-ui
