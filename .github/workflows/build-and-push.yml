name: WeKnora 镜像构建与推送

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ${{ vars.REGISTRY || 'crpi-u265r07n4blchcqo.cn-shanghai.personal.cr.aliyuncs.com' }}
  REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE || 'ck-registry' }}
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ===================================================================
  # App: native build per platform (parallel jobs, each has own timeout)
  # ===================================================================
  build-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_tag: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 准备版本信息
        id: version
        run: |
          eval "$(./scripts/get_version.sh env)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit_id=$COMMIT_ID" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"
          echo "go_version=$GO_VERSION" >> "$GITHUB_OUTPUT"
          ./scripts/get_version.sh info

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 构建并推送 App 镜像（${{ matrix.platform }}）
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: ${{ matrix.platform }}
          file: docker/Dockerfile.app
          context: .
          build-args: |
            VERSION_ARG=${{ steps.version.outputs.version }}
            COMMIT_ID_ARG=${{ steps.version.outputs.commit_id }}
            BUILD_TIME_ARG=${{ steps.version.outputs.build_time }}
            GO_VERSION_ARG=${{ steps.version.outputs.go_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-app:${{ github.sha }}-${{ matrix.arch_tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-app:${{ matrix.arch_tag }}
          cache-from: type=gha,scope=weknora-app-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=weknora-app-${{ matrix.arch_tag }}

  # ===================================================================
  # Docreader: 需要本地 protoc 安装，用原生 runner 各自构建
  # ===================================================================
  build-docreader:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_tag: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 构建并推送 Docreader 镜像（${{ matrix.platform }}）
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: ${{ matrix.platform }}
          file: docker/Dockerfile.docreader
          context: .
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-docreader:${{ github.sha }}-${{ matrix.arch_tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-docreader:${{ matrix.arch_tag }}
          cache-from: type=gha,scope=weknora-docreader-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=weknora-docreader-${{ matrix.arch_tag }}

  # ===================================================================
  # UI: multi-platform build in one shot (nginx + static files, fast)
  # ===================================================================
  build-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 构建前端
        env:
          VITE_IS_DOCKER: true
          VITE_FRONTEND_COMMIT: ${{ github.sha }}
        run: ./scripts/build_frontend_dist.sh

      - name: 设置 QEMU（跨平台仿真）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          driver-opts: |
            image=docker.m.daocloud.io/moby/buildkit:buildx-stable-1

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 构建并推送 UI 镜像
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          file: frontend/Dockerfile
          context: ./frontend
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-ui:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-ui:latest
          cache-from: type=gha,scope=weknora-ui
          cache-to: type=gha,mode=max,scope=weknora-ui

  # ===================================================================
  # MCP Gateway: Python 项目，多架构并行构建
  # ===================================================================
  build-mcp-gateway:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_tag: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 构建并推送 MCP Gateway 镜像（${{ matrix.platform }}）
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: ${{ matrix.platform }}
          file: mcp-gateway/Dockerfile
          context: ./mcp-gateway
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-mcp-gateway:${{ github.sha }}-${{ matrix.arch_tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-mcp-gateway:${{ matrix.arch_tag }}
          cache-from: type=gha,scope=weknora-mcp-gateway-${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=weknora-mcp-gateway-${{ matrix.arch_tag }}

  # ===================================================================
  # Manifest: 合并多架构镜像到 latest 标签
  # ===================================================================
  merge-manifest:
    runs-on: ubuntu-latest
    needs: [build-app, build-docreader, build-ui, build-mcp-gateway]
    timeout-minutes: 10

    steps:
      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 创建多架构 manifest（weknora-app:latest）
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-app:latest \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-app:amd64 \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-app:arm64

      - name: 创建多架构 manifest（weknora-docreader:latest）
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-docreader:latest \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-docreader:amd64 \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-docreader:arm64

      - name: 创建多架构 manifest（weknora-mcp-gateway:latest）
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-mcp-gateway:latest \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-mcp-gateway:amd64 \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/weknora-mcp-gateway:arm64
